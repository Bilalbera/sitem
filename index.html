<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bilal Studios - Project Neo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --neon-cyan: #00f0ff;
            --neon-magenta: #ff0055;
            --bg-dark: #05050a;
            --text-main: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            height: 100vh;
            position: relative;
        }

        /* ==========================================================================
           1. YÜKLENME EKRANI (LOADING SCREEN)
           ========================================================================== */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #020205;
            z-index: 999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 1.5s ease-in-out, visibility 1.5s; /* Yavaşça kapanma animasyonu */
        }

        /* Ekran kapanırken tetiklenecek class */
        .loading-screen.fade-out {
            opacity: 0;
            visibility: hidden;
        }

        .studio-logo {
            font-size: 4rem;
            font-weight: 900;
            letter-spacing: 8px;
            text-transform: uppercase;
            color: #fff;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.6);
            margin-bottom: 3rem;
            text-align: center;
        }

        /* Yükleme Çubuğu Alanı */
        .loader-container {
            width: 300px;
            background: rgba(255, 255, 255, 0.05);
            padding: 4px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            transition: opacity 0.5s ease;
        }

        /* Çubuk dolunca sadece barı gizlemek için kullanılacak */
        .loader-container.hide-bar {
            opacity: 0;
        }

        .progress-bar {
            width: 0%; /* JS ile doldurulacak */
            height: 8px;
            background: linear-gradient(90deg, var(--neon-magenta), var(--neon-cyan));
            border-radius: 50px;
            box-shadow: 0 0 10px var(--neon-cyan);
            transition: width 0.1s linear;
        }

        .loading-text {
            font-size: 0.8rem;
            letter-spacing: 3px;
            color: #555;
            margin-top: 10px;
            text-transform: uppercase;
        }

        /* ==========================================================================
           2. ANA MENÜ (MAIN MENU)
           ========================================================================== */
        .main-menu-content {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            padding-left: 10%;
            background-image: 
                linear-gradient(to right, rgba(0, 240, 255, 0.03) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(0, 240, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            opacity: 0;
            transform: scale(1.05);
            transition: all 2s ease-in-out;
        }

        /* Giriş ekranı bitince menünün canlanması için */
        .main-menu-content.show-menu {
            opacity: 1;
            transform: scale(1);
        }

        .game-header {
            position: absolute;
            top: 10%;
            left: 10%;
        }

        .game-title {
            font-size: 3.5rem;
            font-weight: 900;
            letter-spacing: 5px;
            text-transform: uppercase;
            text-shadow: 0 0 10px var(--neon-cyan), 0 0 20px var(--neon-cyan);
            animation: glitch 3s infinite;
        }

        .game-subtitle {
            font-size: 0.9rem;
            letter-spacing: 8px;
            color: var(--neon-magenta);
            text-transform: uppercase;
            margin-top: 5px;
            opacity: 0.8;
        }

        .menu-container {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            margin-top: 5rem;
        }

        .menu-item {
            font-size: 1.8rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 1.5rem;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            padding: 0.5rem 1rem;
            border-left: 4px solid transparent;
        }

        .menu-item:hover {
            color: #fff;
            border-left: 4px solid var(--neon-cyan);
            padding-left: 2rem;
            background: linear-gradient(to right, rgba(0, 240, 255, 0.08), transparent);
        }

        .menu-item i {
            font-size: 1.2rem;
            color: var(--neon-magenta);
            opacity: 0;
            transform: translateX(-10px);
            transition: all 0.2s ease-in-out;
        }

        .menu-item:hover i {
            opacity: 1;
            transform: translateX(0);
        }

        @keyframes glitch {
            0%, 100% { transform: none; transform: skew(0deg); }
            45% { transform: none; transform: skew(0deg); }
            46% { transform: skew(-5deg); text-shadow: 3px 0 var(--neon-magenta), -3px 0 var(--neon-cyan); }
            47% { transform: skew(5deg); }
            48% { transform: none; }
            49% { transform: skew(3deg); }
            50% { transform: none; }
        }
    </style>
</head>
<body>

    <div class="loading-screen" id="loadingScreen">
        <div class="studio-logo">BILAL STUDIOS</div>
        
        <div class="loader-container" id="loaderContainer">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        <div class="loading-text" id="loadingText">Sistemler Yükleniyor...</div>
    </div>

    <div class="main-menu-content" id="mainMenu">
        <div class="game-header">
            <h1 class="game-title">PROJECT: NEO</h1>
            <div class="game-subtitle">// EARLY ACCESS 2026</div>
        </div>

        <div class="menu-container">
            <div class="menu-item"><i class="fa-solid fa-play"></i> OYUNA BAŞLA</div>
            <div class="menu-item"><i class="fa-solid fa-floppy-disk"></i> KAYDI YÜKLE</div>
            <div class="menu-item"><i class="fa-solid fa-gear"></i> AYARLAR</div>
            <div class="menu-item" style="color: rgba(255,0,85,0.6);"><i class="fa-solid fa-power-off"></i> ÇIKIŞ</div>
        </div>
    </div>

    <script>
        const progressBar = document.getElementById('progressBar');
        const loaderContainer = document.getElementById('loaderContainer');
        const loadingText = document.getElementById('loadingText');
        const loadingScreen = document.getElementById('loadingScreen');
        const mainMenu = document.getElementById('mainMenu');

        let progress = 0;

        // 1. Adım: Yükleme çubuğunu doldurma simülasyonu
        const loadingInterval = setInterval(() => {
            // Rastgele hızlarda dolsun ki gerçekçi dursun
            progress += Math.floor(Math.random() * 8) + 2; 
            
            if (progress >= 100) {
                progress = 100;
                clearInterval(loadingInterval);
                onLoadingComplete(); // Yükleme bittiğinde tetikle
            }
            
            progressBar.style.width = progress + '%';
        }, 150);

        // 2. Adım: Yükleme bittiğinde çalışacak fonksiyon
        function onLoadingComplete() {
            loadingText.innerText = "Yükleme Tamamlandı";
            
            // İstediğin gibi: Yükleme çizgisi kayboluyor
            setTimeout(() => {
                loaderContainer.classList.add('hide-bar');
                loadingText.style.opacity = '0';
            }, 400);

            // 3. Adım: Çizgi gittikten sonra BİLAL STUDIOS yazısı 1.8 saniye daha kalıyor
            setTimeout(() => {
                // Ekran yavaşça (CSS transition ile 1.5 saniyede) kapanıyor
                loadingScreen.classList.add('fade-out');
                
                // Aynı anda arkadaki ana menü yavaşça canlanarak geliyor
                mainMenu.classList.add('show-menu');
            }, 2200); // 400ms bar gizleme + 1800ms ekstra bekleme süresi
        }
    </script>
</body>
</html>
