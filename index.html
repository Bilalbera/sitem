<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Süper Düper Game Menu</title>
    <!-- İkonlar için FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --neon-cyan: #00f0ff;
            --neon-magenta: #ff0055;
            --bg-dark: #05050a;
            --text-main: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Courier New', Courier, monospace; /* Retro-fütüristik hava için */
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            padding-left: 10%;
            /* Arka plan siber ızgara (Grid) efekti */
            background-image: 
                linear-gradient(to right, rgba(0, 240, 255, 0.03) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(0, 240, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            position: relative;
        }

        /* Arka plandaki devasa neon ışık süzmesi */
        body::before {
            content: '';
            position: absolute;
            top: 50%;
            right: -10%;
            transform: translateY(-50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255, 0, 85, 0.15) 0%, transparent 70%);
            z-index: 0;
            pointer-events: none;
        }

        /* Oyun Başlığı (Logo Area) */
        .game-header {
            position: absolute;
            top: 10%;
            left: 10%;
            z-index: 2;
        }

        .game-title {
            font-size: 3.5rem;
            font-weight: 900;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: #fff;
            text-shadow: 
                0 0 10px var(--neon-cyan),
                0 0 20px var(--neon-cyan);
            animation: glitch 3s infinite;
        }

        .game-subtitle {
            font-size: 0.9rem;
            letter-spacing: 8px;
            color: var(--neon-magenta);
            text-transform: uppercase;
            margin-top: 5px;
            opacity: 0.8;
        }

        /* Menü Listesi Konteyneri */
        .menu-container {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            z-index: 2;
            margin-top: 5rem;
        }

        /* Ortak Menü Linki Stili */
        .menu-item {
            font-size: 1.8rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 1.5rem;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            position: relative;
            padding: 0.5rem 1rem;
            border-left: 4px solid transparent;
        }

        /* Hover Etkisi (Oyuncu seçeneğin üstüne geldiğinde) */
        .menu-item:hover {
            color: #fff;
            border-left: 4px solid var(--neon-cyan);
            padding-left: 2rem;
            background: linear-gradient(to right, rgba(0, 240, 255, 0.08), transparent);
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.6);
        }

        /* Seçim İkonu */
        .menu-item i {
            font-size: 1.2rem;
            color: var(--neon-magenta);
            opacity: 0;
            transform: translateX(-10px);
            transition: all 0.2s ease-in-out;
        }

        .menu-item:hover i {
            opacity: 1;
            transform: translateX(0);
            animation: pulse 1s infinite alternate;
        }

        /* Alt Bilgi Skoru / Sürüm */
        .game-footer {
            position: absolute;
            bottom: 5%;
            left: 10%;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.3);
            display: flex;
            gap: 2rem;
        }

        .system-status {
            color: var(--neon-cyan);
        }

        /* --- ANİMASYONLAR --- */
        @keyframes glitch {
            0%, 100% { transform: none; transform: skew(0deg); }
            45% { transform: none; transform: skew(0deg); }
            46% { transform: skew(-5deg); text-shadow: 3px 0 var(--neon-magenta), -3px 0 var(--neon-cyan); }
            47% { transform: skew(5deg); }
            48% { transform: none; }
            49% { transform: skew(3deg); }
            50% { transform: none; }
        }

        @keyframes pulse {
            from { transform: scale(1); opacity: 0.7; }
            to { transform: scale(1.3); opacity: 1; }
        }

        /* Tıklama Efekti İçin Flash Sınıfı */
        .flash-active {
            background: var(--neon-magenta) !important;
            color: #000 !important;
            box-shadow: 0 0 30px var(--neon-magenta);
        }
    </style>
</head>
<body>

    <!-- Oyun Başlığı -->
    <div class="game-header">
        <h1 class="game-title">PROJECT: NEO</h1>
        <div class="game-subtitle">// EARLY ACCESS 2026</div>
    </div>

    <!-- Oyun Menü Linkleri -->
    <div class="menu-container">
        <div class="menu-item" onclick="selectOption('START GAME')">
            <i class="fa-solid fa-play"></i> OYUNA BAŞLA
        </div>
        <div class="menu-item" onclick="selectOption('LOAD GAME')">
            <i class="fa-solid fa-floppy-disk"></i> KAYDI YÜKLE
        </div>
        <div class="menu-item" onclick="selectOption('MULTIPLAYER')">
            <i class="fa-solid fa-globe"></i> ÇEVRİMİÇİ ODALAR
        </div>
        <div class="menu-item" onclick="selectOption('SETTINGS')">
            <i class="fa-solid fa-gear"></i> AYARLAR
        </div>
        <div class="menu-item" onclick="selectOption('CREDITS')">
            <i class="fa-solid fa-users"></i> YAPIMCILAR
        </div>
        <div class="menu-item" style="color: rgba(255,0,85,0.6);" onclick="selectOption('EXIT')">
            <i class="fa-solid fa-power-off"></i> MASAÜSTÜNE DÖN
        </div>
    </div>

    <!-- Alt Veriler -->
    <div class="game-footer">
        <div>SERVER STATUS: <span class="system-status">ONLINE [EU-WEST]</span></div>
        <div>VERSION: v0.98.4-ALPHA</div>
    </div>

    <!-- Menü Ses ve Tıklama Scripti -->
    <script>
        // Oyun içi etkileşim hissi yaratmak için Web Audio API kullanarak yapay "BİP" sesleri üretelim
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(freq, type, duration) {
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            oscillator.type = type;
            oscillator.frequency.value = freq;
            
            gainNode.gain.setValueAtTime(0.05, audioCtx.currentTime); // Sesi çok açıp kulak tırmalamasın
            gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + duration);
        }

        // Menü elemanlarının üzerine gelince siber "bip" sesi çıksın
        const menuItems = document.querySelectorAll('.menu-item');
        menuItems.forEach(item => {
            item.addEventListener('mouseenter', () => {
                playSound(800, 'square', 0.05);
            });
        });

        // Seçeneğe tıklayınca arcade patlama/onaylama efekti
        function selectOption(optionName) {
            playSound(400, 'sawtooth', 0.3);
            
            // Tıklanan elemanı bul ve flash efekti ver
            const eventTarget = event.currentTarget;
            eventTarget.classList.add('flash-active');
            
            setTimeout(() => {
                eventTarget.classList.remove('flash-active');
                alert(`"${optionName}" Modu Başlatılıyor...`);
            }, 200);
        }
    </script>
</body>
</html>
